<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartoonizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ── Variables ── */
  :root {
    --bg:         #161616;
    --sidebar:    #1f1f1f;
    --panel:      #252525;
    --border:     #2e2e2e;
    --fg:         #f0f0f0;
    --fg-mid:     #909090;
    --fg-dim:     #555555;
    --accent:     #a55b4b;
    --accent-h:   #c06b58;
    --accent-off: #5c3530;
    --canvas-bg:  #111111;
    --radius:     8px;
    --sidebar-w:  260px;
    font-family: 'Poppins', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 1fr 32px;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    grid-row: 1 / 2;
    display: flex;
    flex-direction: column;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .logo-zone {
    flex-shrink: 0;
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: lowercase;
  }
  .logo-text span { color: var(--fg-dim); font-weight: 400; }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 18px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar-body::-webkit-scrollbar { width: 4px; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sep { border: none; border-top: 1px solid var(--border); margin: 20px 0 0; }
  .sec-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--fg-dim);
    text-transform: uppercase;
    margin: 10px 0 8px;
  }

  .file-label {
    font-size: 11px;
    color: var(--fg-dim);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 18px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 11px 14px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    outline: none;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { cursor: not-allowed; opacity: 0.5; }

  .btn-open {
    background: var(--panel);
    color: var(--fg);
    border: 1px solid var(--border);
    margin-bottom: 0;
  }
  .btn-open:hover:not(:disabled) { background: var(--border); }

  .btn-action {
    background: var(--accent);
    color: #fff;
    margin-top: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    padding: 13px;
  }
  .btn-action:hover:not(:disabled) { background: var(--accent-h); }
  .btn-action.off { background: var(--accent-off); }

  .btn-save {
    background: var(--panel);
    color: var(--fg-dim);
    border: 1px solid var(--border);
  }
  .btn-save.ready { color: var(--fg); }
  .btn-save.ready:hover { background: var(--border); }

  /* ── k slider ── */
  .k-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin: 6px 0 0;
  }
  .k-value {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    color: var(--fg);
    min-width: 44px;
  }
  .k-unit { font-size: 13px; color: var(--fg-dim); }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    margin: 10px 0 6px;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--sidebar);
    transition: background 0.15s;
  }
  input[type="range"]:hover::-webkit-slider-thumb { background: var(--accent-h); }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--sidebar);
  }

  .hint-text {
    font-size: 9px;
    color: var(--fg-dim);
    line-height: 1.6;
    margin-top: 2px;
  }

  .hint-nav {
    font-size: 9px;
    color: var(--fg-dim);
    line-height: 1.8;
    margin-top: 8px;
  }

  /* ── Canvas area ── */
  .canvas-area {
    grid-column: 2;
    grid-row: 1;
    background: var(--canvas-bg);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #main-canvas {
    position: absolute;
    inset: 0;
    cursor: grab;
  }
  #main-canvas.dragging { cursor: grabbing; }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: none;
    user-select: none;
  }
  .placeholder-box {
    width: 64px; height: 64px;
    border: 1px dashed var(--fg-dim);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .placeholder-box svg { opacity: 0.3; }
  .placeholder p { font-size: 12px; color: var(--fg-dim); }

  /* drag-over highlight */
  .canvas-area.dragover::after {
    content: 'Drop image here';
    position: absolute; inset: 0;
    background: rgba(165,91,75,0.12);
    border: 2px dashed var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: var(--accent);
    pointer-events: none;
  }

  /* zoom badge */
  #zoom-badge {
    position: absolute;
    bottom: 12px; right: 12px;
    font-size: 11px; color: var(--fg-dim);
    background: rgba(0,0,0,0.5);
    padding: 2px 7px;
    border-radius: 4px;
    display: none;
  }

  /* ── Spinner overlay ── */
  #spinner-overlay {
    position: absolute; inset: 0;
    background: rgba(17,17,17,0.7);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    z-index: 10;
  }
  #spinner-overlay.active { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-label { font-size: 12px; color: var(--fg-mid); }

  /* ── Status bar ── */
  .statusbar {
    grid-column: 1 / -1;
    grid-row: 2;
    background: var(--sidebar);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    color: var(--fg-dim);
  }

  /* ── File input (hidden) ── */
  #file-input { display: none; }

  /* ── Mobile responsive ── */
  @media (max-width: 600px) {
    :root { --sidebar-w: 100%; }
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr 32px;
    }
    .sidebar {
      grid-row: 1;
      max-height: 260px;
    }
    .canvas-area {
      grid-column: 1;
      grid-row: 2;
    }
    .statusbar { grid-row: 3; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo-zone">
      <div class="logo-text">cartoon<span>izer</span></div>
    </div>
    <div class="sidebar-body">

      <hr class="sep" />
      <div class="sec-tag">Image</div>
      <div class="file-label" id="file-label">No file selected</div>
      <button class="btn btn-open" id="btn-open">Open image</button>

      <hr class="sep" />
      <div class="sec-tag">Colors</div>
      <div class="k-row">
        <span class="k-value" id="k-display">15</span>
        <span class="k-unit">k</span>
      </div>
      <input type="range" id="k-slider" min="2" max="64" step="1" value="15" />
      <div class="hint-text">lower → fewer colors, more stylised</div>

      <hr class="sep" />
      <div class="sec-tag">Actions</div>
      <button class="btn btn-action off" id="btn-action" disabled>Generate</button>
      <button class="btn btn-save" id="btn-save" disabled>Save…</button>

      <hr class="sep" />
      <div class="hint-nav">
        scroll to zoom · drag to pan<br />
        double-click to reset view<br />
        or drop image onto canvas
      </div>
    </div>
  </aside>

  <!-- ── Canvas ── -->
  <main class="canvas-area" id="canvas-area">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-box">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <p>Open or drop an image to begin</p>
    </div>
    <canvas id="main-canvas"></canvas>
    <div id="zoom-badge">1.0×</div>
    <div id="spinner-overlay">
      <div class="spinner"></div>
      <div class="spinner-label">Processing…</div>
    </div>
  </main>

  <!-- ── Status bar ── -->
  <footer class="statusbar">
    <span id="status-text">Open an image to begin.</span>
  </footer>

</div>

<input type="file" id="file-input" accept="image/*" />

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// IMPORTANT: replace this with your Render backend URL after deploying
const API_BASE = "https://YOUR-APP-NAME.onrender.com";

// ── State ─────────────────────────────────────────────────────────────────────
let srcFile   = null;
let outDataUrl = null;
let hasRun    = false;
let busy      = false;
let zoom      = 1.0;
let panX      = 0, panY = 0;
let dragStart = null;
let outImg    = null;   // HTMLImageElement of the result

// ── DOM refs ──────────────────────────────────────────────────────────────────
const fileInput    = document.getElementById("file-input");
const fileLabel    = document.getElementById("file-label");
const btnOpen      = document.getElementById("btn-open");
const kSlider      = document.getElementById("k-slider");
const kDisplay     = document.getElementById("k-display");
const btnAction    = document.getElementById("btn-action");
const btnSave      = document.getElementById("btn-save");
const canvasArea   = document.getElementById("canvas-area");
const canvas       = document.getElementById("main-canvas");
const ctx          = canvas.getContext("2d");
const placeholder  = document.getElementById("placeholder");
const zoomBadge    = document.getElementById("zoom-badge");
const spinnerOverlay = document.getElementById("spinner-overlay");
const statusText   = document.getElementById("status-text");

// ── k slider ──────────────────────────────────────────────────────────────────
kSlider.addEventListener("input", () => {
  kDisplay.textContent = kSlider.value;
});

// ── Open image ────────────────────────────────────────────────────────────────
btnOpen.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  srcFile  = file;
  outDataUrl = null;
  hasRun   = false;
  zoom     = 1.0; panX = 0; panY = 0; outImg = null;
  fileLabel.textContent = file.name;
  placeholder.style.display = "flex";
  clearCanvas();
  setStatus(`${file.name}`);
  refreshButtons();
}

// ── Drag & drop onto canvas ────────────────────────────────────────────────────
canvasArea.addEventListener("dragover", e => {
  e.preventDefault();
  canvasArea.classList.add("dragover");
});
canvasArea.addEventListener("dragleave", () => canvasArea.classList.remove("dragover"));
canvasArea.addEventListener("drop", e => {
  e.preventDefault();
  canvasArea.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) loadFile(file);
});

// ── Generate / Retry ──────────────────────────────────────────────────────────
btnAction.addEventListener("click", () => {
  if (!srcFile || busy) return;
  runCartoonize();
});

async function runCartoonize() {
  busy = true;
  spinnerOverlay.classList.add("active");
  setStatus("Processing…");
  refreshButtons();

  try {
    // Read file as base64 data URL
    const dataUrl = await fileToDataUrl(srcFile);
    const k = parseInt(kSlider.value);

    const res = await fetch(`${API_BASE}/cartoonize`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: dataUrl, k }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || "Server error");
    }

    const data = await res.json();
    outDataUrl = data.image;
    hasRun     = true;

    // Draw result
    outImg = new Image();
    outImg.onload = () => {
      zoom = 1.0; panX = 0; panY = 0;
      placeholder.style.display = "none";
      drawResult();
      setStatus(`k = ${data.k}  ·  ${data.width} × ${data.height}  ·  scroll to zoom  ·  double-click to reset`);
    };
    outImg.src = outDataUrl;

  } catch (e) {
    setStatus(`Error: ${e.message}`);
    alert(`Processing failed: ${e.message}`);
  } finally {
    busy = false;
    spinnerOverlay.classList.remove("active");
    refreshButtons();
  }
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error("File read error"));
    r.readAsDataURL(file);
  });
}

// ── Save ──────────────────────────────────────────────────────────────────────
btnSave.addEventListener("click", () => {
  if (!outDataUrl) return;
  const base = (srcFile?.name || "image").replace(/\.[^.]+$/, "");
  const a = document.createElement("a");
  a.href = outDataUrl;
  a.download = `${base}_cartoon.png`;
  a.click();
  setStatus(`Saved  ·  ${base}_cartoon.png`);
});

// ── Canvas drawing ────────────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = canvasArea.clientWidth;
  canvas.height = canvasArea.clientHeight;
  if (outImg) drawResult();
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawResult() {
  if (!outImg) return;
  const cw = canvas.width, ch = canvas.height;
  const base = Math.min(cw / outImg.naturalWidth, ch / outImg.naturalHeight);
  const scale = base * zoom;
  const nw = outImg.naturalWidth  * scale;
  const nh = outImg.naturalHeight * scale;
  const ox = cw / 2 + panX - nw / 2;
  const oy = ch / 2 + panY - nh / 2;

  ctx.clearRect(0, 0, cw, ch);
  ctx.drawImage(outImg, ox, oy, nw, nh);

  // Zoom badge
  if (Math.abs(zoom - 1.0) > 0.05) {
    zoomBadge.style.display = "block";
    zoomBadge.textContent   = `${zoom.toFixed(1)}×`;
  } else {
    zoomBadge.style.display = "none";
  }
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  zoom = Math.max(0.1, Math.min(10, zoom * factor));
  drawResult();
}, { passive: false });

canvas.addEventListener("dblclick", () => {
  zoom = 1.0; panX = 0; panY = 0;
  drawResult();
});

// ── Pan ───────────────────────────────────────────────────────────────────────
canvas.addEventListener("mousedown", e => {
  if (!outImg) return;
  dragStart = { x: e.clientX, y: e.clientY };
  canvas.classList.add("dragging");
});
window.addEventListener("mousemove", e => {
  if (!dragStart || !outImg) return;
  panX += e.clientX - dragStart.x;
  panY += e.clientY - dragStart.y;
  dragStart = { x: e.clientX, y: e.clientY };
  drawResult();
});
window.addEventListener("mouseup", () => {
  dragStart = null;
  canvas.classList.remove("dragging");
});

// Touch pan/zoom
let lastTouchDist = null;
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
canvas.addEventListener("touchmove", e => {
  if (e.touches.length === 1 && dragStart) {
    panX += e.touches[0].clientX - dragStart.x;
    panY += e.touches[0].clientY - dragStart.y;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    drawResult();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY,
    );
    if (lastTouchDist) zoom = Math.max(0.1, Math.min(10, zoom * (dist / lastTouchDist)));
    lastTouchDist = dist;
    drawResult();
  }
}, { passive: true });
canvas.addEventListener("touchend", () => { dragStart = null; lastTouchDist = null; });

// ── Refresh button states ─────────────────────────────────────────────────────
function refreshButtons() {
  const hasSrc = !!srcFile;
  const hasOut = !!outDataUrl;

  if (busy) {
    btnAction.textContent = "Processing…";
    btnAction.className   = "btn btn-action off";
    btnAction.disabled    = true;
  } else if (hasRun) {
    btnAction.textContent = "Retry";
    btnAction.className   = "btn btn-action";
    btnAction.disabled    = false;
  } else {
    btnAction.textContent = "Generate";
    btnAction.className   = "btn btn-action" + (hasSrc ? "" : " off");
    btnAction.disabled    = !hasSrc;
  }

  btnSave.disabled = !hasOut;
  btnSave.className = hasOut ? "btn btn-save ready" : "btn btn-save";
}

function setStatus(msg) {
  statusText.textContent = msg;
}
</script>
</body>
</html>
